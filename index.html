
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  #app { padding: 1rem 0; font-family: var(--font-sans, sans-serif); }
  h2 { font-size: 18px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: var(--color-text-secondary); margin-bottom: 1rem; }
  .name-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 12px; }
  .name-row label { font-size: 13px; color: var(--color-text-secondary); }
  .name-row input { border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 6px 10px; font-size: 14px; background: var(--color-background-primary); color: var(--color-text-primary); width: 140px; }
  .btn { border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 6px 14px; font-size: 13px; background: var(--color-background-primary); color: var(--color-text-primary); cursor: pointer; }
  .btn:hover { background: var(--color-background-secondary); }
  .btn-reset { color: var(--color-text-secondary); font-size: 12px; padding: 4px 10px; }
  .map-wrap { position: relative; width: 100%; }
  svg.map { width: 100%; height: auto; display: block; }
  .commune { fill: #e8f0e0; stroke: #aaa; stroke-width: 0.6; cursor: pointer; transition: fill 0.15s; }
  .commune:hover { stroke: #333; stroke-width: 1.5; }
  .cname { font-size: 4.2px; fill: #333; pointer-events: none; font-family: var(--font-sans, sans-serif); text-anchor: middle; dominant-baseline: middle; }
  .zone-label { font-size: 5px; fill: #888; font-style: italic; font-family: var(--font-sans,sans-serif); text-anchor: middle; pointer-events: none; }
  .road-label { font-size: 3.8px; fill: #c55; font-family: var(--font-sans,sans-serif); pointer-events: none; }
  .legend { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 0.75rem; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--color-text-secondary); }
  .legend-dot { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; }
  .results { margin-top: 1rem; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1rem; background: var(--color-background-secondary); }
  .results h3 { font-size: 14px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 10px; }
  .result-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 5px 0; font-size: 13px; border-bottom: 0.5px solid var(--color-border-tertiary); gap: 8px; }
  .result-row:last-child { border-bottom: none; }
  .result-name { color: var(--color-text-secondary); white-space: nowrap; }
  .result-communes { color: var(--color-text-primary); font-size: 12px; text-align: right; }
  .status { font-size: 12px; color: var(--color-text-secondary); margin-top: 8px; text-align: right; }
  .tooltip { position: absolute; background: var(--color-background-primary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 6px 10px; font-size: 12px; pointer-events: none; display: none; z-index: 10; color: var(--color-text-primary); white-space: nowrap; }
</style>

<script>
const COLORS = ['#4a90d9','#e07840','#8e5cad','#3dab6b','#d44','#b07830'];
const STORAGE_KEY = 'terrain_votes_v3';

let myName = '';
let mySelected = new Set();
let allVotes = {};

async function loadVotes() {
  try {
    const r = await window.storage.get(STORAGE_KEY, true);
    allVotes = r ? JSON.parse(r.value) : {};
  } catch(e) { allVotes = {}; }
}

async function saveVotes() {
  try {
    await window.storage.set(STORAGE_KEY, JSON.stringify(allVotes), true);
  } catch(e) {}
}

function renderMap() {
  document.querySelectorAll('.commune').forEach(el => {
    el.style.fill = '#e8f0e0';
    const rect = el.querySelector('rect');
    if (rect) { rect.setAttribute('stroke','#aaa'); rect.setAttribute('stroke-width','0.6'); }
  });

  const names = Object.keys(allVotes);
  const communeVoters = {};
  names.forEach((name, pi) => {
    (allVotes[name]||[]).forEach(cid => {
      if (!communeVoters[cid]) communeVoters[cid] = [];
      communeVoters[cid].push(pi);
    });
  });

  Object.entries(communeVoters).forEach(([cid, voters]) => {
    const el = document.getElementById(cid);
    if (!el) return;
    if (voters.length === 1) {
      el.style.fill = COLORS[voters[0] % COLORS.length];
    } else {
      el.style.fill = '#999';
    }
  });

  // Bold border for my selection
  mySelected.forEach(cid => {
    const el = document.getElementById(cid);
    if (el) {
      const rect = el.querySelector('rect');
      if (rect) { rect.setAttribute('stroke','#111'); rect.setAttribute('stroke-width','2'); }
    }
  });
}

function renderLegend() {
  const leg = document.getElementById('legend');
  const names = Object.keys(allVotes);
  leg.innerHTML = '';
  names.forEach((name, pi) => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `<div class="legend-dot" style="background:${COLORS[pi%COLORS.length]}"></div><span>${name}</span>`;
    leg.appendChild(item);
  });
  if (names.length > 1) {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `<div class="legend-dot" style="background:#999"></div><span>Plusieurs votes</span>`;
    leg.appendChild(item);
  }
}

function renderResults() {
  const list = document.getElementById('resultsList');
  const names = Object.keys(allVotes);
  if (names.length === 0) {
    list.innerHTML = '<p style="font-size:13px;color:var(--color-text-secondary)">Aucune réponse enregistrée.</p>';
    return;
  }
  list.innerHTML = names.map(name => {
    const communes = allVotes[name] || [];
    const labels = communes.map(cid => {
      const el = document.getElementById(cid);
      return el ? el.getAttribute('data-name') : cid;
    }).join(', ');
    return `<div class="result-row">
      <span class="result-name">${name}</span>
      <span class="result-communes">${labels || '—'}</span>
    </div>`;
  }).join('');
}

function render() { renderMap(); renderLegend(); renderResults(); }

document.querySelectorAll('.commune').forEach(el => {
  el.addEventListener('click', () => {
    const cid = el.id;
    if (mySelected.has(cid)) mySelected.delete(cid);
    else mySelected.add(cid);
    render();
  });
  el.addEventListener('mouseenter', (e) => {
    const tip = document.getElementById('tooltip');
    const name = el.getAttribute('data-name');
    const selectors = Object.keys(allVotes).filter(n => (allVotes[n]||[]).includes(el.id));
    tip.textContent = name + (selectors.length ? ' — ' + selectors.join(', ') : '');
    tip.style.display = 'block';
  });
  el.addEventListener('mouseleave', () => { document.getElementById('tooltip').style.display = 'none'; });
  el.addEventListener('mousemove', (e) => {
    const tip = document.getElementById('tooltip');
    const wrap = document.querySelector('.map-wrap');
    const rect = wrap.getBoundingClientRect();
    tip.style.left = (e.clientX - rect.left + 10) + 'px';
    tip.style.top = (e.clientY - rect.top - 35) + 'px';
  });
});

document.getElementById('saveBtn').addEventListener('click', async () => {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) { alert('Entre ton prénom avant d\'enregistrer.'); return; }
  myName = name;
  await loadVotes();
  allVotes[myName] = Array.from(mySelected);
  await saveVotes();
  document.getElementById('statusMsg').textContent = `Enregistré à ${new Date().toLocaleTimeString('fr-BE')}`;
  render();
});

document.getElementById('clearBtn').addEventListener('click', async () => {
  const name = document.getElementById('nameInput').value.trim();
  mySelected.clear();
  if (name && allVotes[name]) { delete allVotes[name]; await saveVotes(); }
  render();
  document.getElementById('statusMsg').textContent = 'Choix effacés.';
});

(async () => { await loadVotes(); render(); })();
setInterval(async () => { await loadVotes(); render(); }, 15000);
</script>
